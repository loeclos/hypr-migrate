# Test: simple k=v config values
general {
    sensitivity = 0.5
    border_size = 2
    no_border_on_floating = false
    gaps_in = 5
    gaps_out = 10
}

decoration {
    rounding = 10
    drop_shadow = yes
    shadow_range = 100
    col_shadow = 0xffeeeeee
}

input {
    kb_layout = us
    kb_options = compose:ralt
    follow_mouse = 2
    touchpad {
        natural_scroll = yes
    }
}

misc {
    disable_autoreload = true
    enable_swallow = no
}
